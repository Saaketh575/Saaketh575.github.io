<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saaketh | Developer Portfolio</title>

<style>
:root{
  --bg:#020617;
  --card:#1e293b;
  --text:#ffffff;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family: 'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:center;
  gap:30px;
  padding:15px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.3);
  z-index:1000;
}

nav a{
  color:#94a3b8;
  text-decoration:none;
}
nav a:hover{color:white;}

/* HEADER */
header{
  text-align:center;
  padding:150px 20px;
}

h1{
  font-size:55px;
  margin:0;
}

.typing{
  color:var(--accent);
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* PROJECT CARD */
.project{
  background:var(--card);
  padding:20px;
  margin:20px 0;
  border-radius:18px;
  cursor:pointer;
  transition:0.3s;
}
.project:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px rgba(56,189,248,0.3);
}

/* TAGS */
.tags span{
  background:#334155;
  padding:6px 10px;
  border-radius:8px;
  margin-right:5px;
  font-size:12px;
}

/* MODAL */
.modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:30px;
  border-radius:20px;
  max-width:600px;
}

/* SKILLS */
.skills span{
  display:inline-block;
  background:#1e293b;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  margin-top:40px;
}

/* BUTTON */
.toggle{
  position:fixed;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* LIGHT MODE */
.light{
  --bg:#ffffff;
  --card:#f1f5f9;
  --text:#000000;
}

/* SCROLL ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<nav>
  <a href="#projects">Projects</a>
  <a href="#skills">Skills</a>
  <a href="#stats">Stats</a>
</nav>

<button class="toggle" onclick="toggleMode()">🌗</button>

<header>
  <h1 id="type"></h1>
  <p class="typing">Python Developer • Game Engineer • Problem Solver</p>
</header>

<div class="container">

<h2 id="projects">Projects</h2>

<div class="project reveal" onclick="openModal('word')">
  <h3>🎮 Word Guessing Game</h3>
  <div class="tags">
    <span>Python</span><span>Algorithms</span>
  </div>
</div>

<div class="project reveal" onclick="openModal('war')">
  <h3>🎮 War Card Game</h3>
  <div class="tags">
    <span>Python</span><span>AI</span>
  </div>
</div>

<h2 id="skills">Skills</h2>
<div class="skills reveal">
  <span>Python</span>
  <span>Algorithms</span>
  <span>Game Design</span>
  <span>Problem Solving</span>
</div>

<h2 id="stats">Stats</h2>
<div class="stats reveal">
  <div><h2>2+</h2><p>Projects</p></div>
  <div><h2>1500+</h2><p>Lines of Code</p></div>
  <div><h2>∞</h2><p>Curiosity</p></div>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<script>

/* TYPING EFFECT */
const text="Hi, I'm Saaketh";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("type").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,50);
  }
}
type();

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* MODALS */
function openModal(name){
  const modal=document.getElementById("modal");
  const content=document.getElementById("modal-content");

  if(name==="word"){
    content.innerHTML=`
      <h2>🎮 Word Guessing Game</h2>
      <p><b>Concept:</b> A logic-based game using a dataset and filtering system.</p>
      <p><b>Features:</b> Hint system, file handling, word filtering.</p>
      <p><b>What I learned:</b> Algorithms and data handling.</p>
      <a href="https://github.com/Saaketh575/word-game" target="_blank">View Code</a>
    `;
  }

  else if(name==="war"){
    content.innerHTML=`
      <h2>🎮 War Card Game</h2>
      <p><b>Concept:</b> Simulates the classic War card game.</p>
      <p><b>Features:</b> AI opponent using probability logic.</p>
      <p><b>What I learned:</b> Game simulation and combinatorics.</p>
      <a href="https://github.com/Saaketh575/war-card-game" target="_blank">View Code</a>
    `;
  }

  modal.style.display="flex";
}

/* CLOSE MODAL */
window.onclick=function(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
}

/* SCROLL ANIMATION */
window.addEventListener("scroll",()=>{
  document.querySelectorAll(".reveal").forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-50){
      el.classList.add("active");
    }
  });
});

</script>

</body>
</html>
