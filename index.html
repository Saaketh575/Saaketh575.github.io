<!DOCTYPE html>
<html>
<head>
  <title>Developer Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
    }

    nav {
      position: fixed;
      width: 100%;
      background: rgba(2,6,23,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      z-index: 1000;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
    }

    nav a:hover { color: white; }

    header {
      text-align: center;
      padding: 140px 20px 80px;
    }

    h1 {
      font-size: 50px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .project {
      background: #1e293b;
      padding: 20px;
      margin: 20px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .project:hover {
      transform: translateY(-5px);
    }

    .tags span {
      background: #334155;
      padding: 5px 10px;
      margin-right: 5px;
      border-radius: 8px;
      font-size: 12px;
    }

    .hidden { display: none; }

    button {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .active-btn {
      background: #38bdf8;
      color: black;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      text-align: center;
      margin: 40px 0;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      max-width: 500px;
    }

    .toggle {
      position: fixed;
      top: 20px;
      right: 20px;
    }

    .light {
      background: white;
      color: black;
    }

    .light .project { background: #e2e8f0; }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: 0.6s;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<nav>
  <a href="#projects">Projects</a>
  <a href="#skills">Skills</a>
  <a href="#stats">Stats</a>
</nav>

<button class="toggle" onclick="toggleMode()">🌗</button>

<header>
  <h1>Hi, I'm [Your Name]</h1>
  <p>Python Game Developer • Problem Solver</p>
</header>

<div class="container">

<h2 id="projects">Projects</h2>

<button onclick="filter('all')" class="active-btn">All</button>
<button onclick="filter('game')">Games</button>

<div class="project reveal game" onclick="openModal('word')">
  <h3>Word Game</h3>
  <div class="tags"><span>Python</span><span>Logic</span></div>
</div>

<div class="project reveal game" onclick="openModal('war')">
  <h3>War Card Game</h3>
  <div class="tags"><span>Python</span><span>AI</span></div>
</div>

<h2 id="skills">Skills</h2>
<p class="reveal">Python • Algorithms • Game Design • Problem Solving</p>

<h2 id="stats">Stats</h2>
<div class="stats reveal">
  <div><h2>5+</h2><p>Projects</p></div>
  <div><h2>1000+</h2><p>Lines of Code</p></div>
  <div><h2>100%</h2><p>Passion</p></div>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<script>

/* Dark mode persistence */
if(localStorage.getItem("mode") === "light"){
  document.body.classList.add("light");
}

function toggleMode(){
  document.body.classList.toggle("light");
  localStorage.setItem("mode",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

/* Filtering */
function filter(type){
  document.querySelectorAll(".project").forEach(p=>{
    p.style.display = (type==="all" || p.classList.contains(type)) ? "block" : "none";
  });
}

/* Modal */
function openModal(name){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");

  if(name==="word"){
    content.innerHTML = "<h2>Word Game</h2><p>Uses file-based dataset, hint system, and filtering logic.</p>";
  } else {
    content.innerHTML = "<h2>War Game</h2><p>AI opponent using combinations and probability logic.</p>";
  }

  modal.style.display = "flex";
}

window.onclick = function(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
  }
}

/* Scroll reveal */
window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".reveal").forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("active");
    }
  });
});

</script>

</body>
</html>
