<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .card:hover { transform: scale(1.1); }
    .selected { border: 3px solid yellow; }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    #log { margin-top: 20px; }

    /* DISCARD */
    .discard-box {
      display:inline-block;
      padding:20px;
      background:#1e293b;
      border-radius:12px;
      cursor:pointer;
      min-width:100px;
      position: relative;
      transition: 0.3s;
    }

    .discard-box:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #38bdf8;
      background:#334155;
    }

    .stack-preview {
      position: absolute;
      top: -10px;
      left: 10px;
      display: flex;
      gap: 5px;
    }

    .mini-card {
      background: #94a3b8;
      color: black;
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 10px;
    }

    /* FULLSCREEN COMPUTER TURN */
    #compOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #020617, #000);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      animation: fadeIn 0.5s;
    }

    #compText {
      font-size: 28px;
      margin-bottom: 20px;
      animation: pulse 1s infinite;
    }

    #compCard {
      font-size: 40px;
      margin: 20px;
      animation: pop 0.5s;
    }

    @keyframes pulse {
      0% {opacity: 0.5;}
      50% {opacity: 1;}
      100% {opacity: 0.5;}
    }

    @keyframes pop {
      from {transform: scale(0);}
      to {transform: scale(1);}
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

  </style>
</head>

<body>

<h1>🎮 Rummy War</h1>

<div id="game">

<h3>Your Hand</h3>
<div id="playerHand"></div>

<h3>🗂 Discard Pile</h3>
<div id="discard" class="discard-box" onclick="drawDiscard()">
  <div id="stackPreview" class="stack-preview"></div>
  <div id="discardTop"></div>
</div>

<div>
  <button onclick="drawDeck()">Draw Deck</button>
  <button onclick="checkMeld()">Check Meld</button>
</div>

<p id="log"></p>

</div>

<!-- FULLSCREEN COMPUTER TURN -->
<div id="compOverlay">
  <div id="compText">🤖 Computer Thinking...</div>
  <div id="compCard"></div>
</div>

<script>

// DATA
const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let phase = "draw";

// INIT
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

deck.sort(()=>Math.random()-0.5);

playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// RENDER
function render(){
  let handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach(card=>{
    let el = document.createElement("div");
    el.className = "card";
    el.innerText = card;
    el.onclick = ()=> discardCard(card);
    handDiv.appendChild(el);
  });

  document.getElementById("discardTop").innerText = discardPile[0] || "Empty";

  let preview = document.getElementById("stackPreview");
  preview.innerHTML = "";
  discardPile.slice(1,4).forEach(c=>{
    let mini = document.createElement("div");
    mini.className="mini-card";
    mini.innerText=c;
    preview.appendChild(mini);
  });
}

// PLAYER
function drawDeck(){
  if(phase !== "draw") return;
  playerHand.push(deck.pop());
  phase = "discard";
  render();
}

function drawDiscard(){
  if(phase !== "draw") return;
  playerHand.push(discardPile.shift());
  phase = "discard";
  render();
}

function discardCard(card){
  if(phase !== "discard") return;

  playerHand.splice(playerHand.indexOf(card),1);
  discardPile.unshift(card);

  phase = "draw";

  startComputerTurn();
}

// CINEMATIC COMPUTER TURN
function startComputerTurn(){

  const overlay = document.getElementById("compOverlay");
  const text = document.getElementById("compText");
  const cardEl = document.getElementById("compCard");

  overlay.style.display = "flex";
  text.innerText = "🤖 Computer Thinking...";
  cardEl.innerText = "";

  setTimeout(()=>{
    let drawn = deck.pop();
    computerHand.push(drawn);

    text.innerText = "🤖 Computer draws";
    cardEl.innerText = drawn;

    setTimeout(()=>{
      let discard = computerHand.shift();
      discardPile.unshift(discard);

      text.innerText = "🤖 Computer plays";
      cardEl.innerText = discard;

      setTimeout(()=>{
        overlay.style.display = "none";
        render();
      },1000);

    },1000);

  },1200);
}

// START
render();

</script>

</body>
</html>
