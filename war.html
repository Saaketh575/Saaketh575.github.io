<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy + War AAA+</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background: radial-gradient(circle, #000, #111);
    color:white;
    transition: 0.3s;
}

/* FX MODE */
body.fx {
    background: radial-gradient(circle at center, #000, #050505, #000);
    background-size:200% 200%;
    animation: bgMove 10s infinite alternate;
}

@keyframes bgMove {
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* MESSAGE */
#msg {
    text-align:center;
    padding:12px;
    background:#111;
    color:#0ff;
    box-shadow:0 0 15px cyan;
}

/* CARDS */
.card {
    display:inline-block;
    padding:15px;
    margin:6px;
    border:2px solid white;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}
body.fx .card:hover {
    transform:scale(1.2) rotate(2deg);
    box-shadow:0 0 25px cyan,0 0 40px cyan;
}
.selected {
    box-shadow:0 0 25px cyan;
}

/* DISCARD */
.discard-card {
    width:90px;
    height:120px;
    margin:auto;
    border:2px solid red;
    display:flex;
    align-items:center;
    justify-content:center;
}
body.fx .discard-card {
    animation:pulseRed 2s infinite;
}
@keyframes pulseRed {
    from{box-shadow:0 0 10px red;}
    to{box-shadow:0 0 30px red;}
}

/* MELDS */
.meld {
    display:inline-block;
    border:2px solid cyan;
    padding:10px;
    margin:5px;
    border-radius:10px;
}
body.fx .meld {
    animation:glowMeld 2s infinite alternate;
}
@keyframes glowMeld {
    from{box-shadow:0 0 10px cyan;}
    to{box-shadow:0 0 30px cyan;}
}

/* WAR */
#warScreen {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:50px;
}
#warContent { margin-bottom:30px; }
#warHint {
    font-size:18px;
    opacity:0.7;
    animation:blink 1s infinite alternate;
}
@keyframes blink {
    from{opacity:0.3;}
    to{opacity:1;}
}

/* AI */
#aiOverlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:yellow;
}

/* CONFIRM */
#confirmOverlay {
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}
#confirmBox {
    background:#111;
    padding:20px;
    border-radius:10px;
}

/* BUTTON */
button {
    margin:5px;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body class="fx">

<div id="msg">Your Turn</div>

<div style="text-align:center;">
<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="layMeld()">Lay Meld</button>
<button onclick="toggleFX()">Toggle FX</button>
</div>

<div id="player" style="text-align:center;"></div>

<div style="text-align:center;color:red;">DISCARD PILE</div>
<div id="discard"></div>

<div style="text-align:center;color:cyan;">TABLE MELDS</div>
<div id="melds"></div>

<!-- CONFIRM -->
<div id="confirmOverlay">
<div id="confirmBox">
<div id="confirmText"></div>
<button onclick="confirmDiscard()">Yes</button>
<button onclick="cancelDiscard()">No</button>
</div>
</div>

<!-- WAR -->
<div id="warScreen">
<div id="warContent"></div>
<div id="warHint">Click to continue...</div>
</div>

<!-- AI -->
<div id="aiOverlay">AI THINKING...</div>

<script>
// DATA
const order=["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits=["♣","♦","♥","♠"];

let deck=[],player=[],ai=[],discard=[];
let selected=[],mustDiscard=false;
let tableMelds=[];

// FX TOGGLE
function toggleFX(){
    document.body.classList.toggle("fx");
}

// BUILD
for(let s of suits) for(let c of order) deck.push(s+c);
deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// MESSAGE QUEUE
let q=[],busy=false;
function msg(t){
    q.push(t);
    if(!busy) show();
}
function show(){
    if(q.length==0){busy=false;return;}
    busy=true;
    document.getElementById("msg").textContent=q.shift();
    setTimeout(show,1400);
}

// RENDER
function render(){
    let p=document.getElementById("player");
    p.innerHTML="";
    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card";
        d.textContent=c;

        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=()=>{
            if(mustDiscard){ askDiscard(i); return; }
            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);
            render();
        };

        p.appendChild(d);
    });

    let ddiv=document.getElementById("discard");
    ddiv.innerHTML="";
    if(discard.length){
        let d=document.createElement("div");
        d.className="discard-card";
        d.textContent=discard[0];
        ddiv.appendChild(d);
    }

    let mdiv=document.getElementById("melds");
    mdiv.innerHTML="";
    tableMelds.forEach(m=>{
        let d=document.createElement("div");
        d.className="meld";
        d.textContent=m.join(" ");
        mdiv.appendChild(d);
    });
}

// DRAW
function drawDeck(){
    if(mustDiscard){msg("Discard first");return;}
    player.push(deck.shift());
    mustDiscard=true;
    msg("Choose discard");
    render();
}

function drawDiscard(){
    if(mustDiscard){msg("Discard first");return;}
    player.push(discard.shift());
    mustDiscard=true;
    msg("Choose discard");
    render();
}

// DISCARD
let pending=null;
function askDiscard(i){
    pending=i;
    document.getElementById("confirmText").textContent="Discard "+player[i]+"?";
    document.getElementById("confirmOverlay").style.display="flex";
}
function confirmDiscard(){
    document.getElementById("confirmOverlay").style.display="none";
    discard.unshift(player.splice(pending,1)[0]);
    mustDiscard=false;
    render();
    aiTurn();
}
function cancelDiscard(){
    document.getElementById("confirmOverlay").style.display="none";
}

// MELD
function meldCheck(c){
    let r=c.map(x=>x.slice(1));
    if(r[0]==r[1]&&r[1]==r[2]) return true;
    let s=c.map(x=>x[0]);
    let i=c.map(x=>order.indexOf(x.slice(1))).sort((a,b)=>a-b);
    return s[0]==s[1]&&s[1]==s[2]&&i[0]+1==i[1]&&i[1]+1==i[2];
}

async function layMeld(){
    if(selected.length!=3){msg("Select 3 cards");return;}
    let m=selected.map(i=>player[i]);

    if(meldCheck(m)){
        selected.sort((a,b)=>b-a).forEach(i=>player.splice(i,1));
        tableMelds.push(m);
        msg("You melded "+m.join(", "));
    } else {
        msg("WAR!");
        await war();
    }

    selected=[];
    mustDiscard=false;
    render();
    aiTurn();
}

// WAR
async function type(text){
    let c=document.getElementById("warContent");
    c.innerHTML="";
    for(let ch of text){
        c.innerHTML+=ch;
        await new Promise(r=>setTimeout(r,35));
    }
    await new Promise(res=>{
        function done(){
            document.removeEventListener("click",done);
            res();
        }
        document.addEventListener("click",done);
    });
}

async function war(){
    let w=document.getElementById("warScreen");
    w.style.display="flex";

    let moves=0;

    while(true){
        let p=player.shift();
        let c=ai.shift();

        await type(p+" vs "+c);

        if(order.indexOf(p.slice(1))>order.indexOf(c.slice(1))){
            player.push(p,c);
            await type("PLAYER WINS");
        } else if(order.indexOf(p.slice(1))<order.indexOf(c.slice(1))){
            ai.push(p,c);
            await type("AI WINS");
        } else {
            await type("WAR!");
        }

        moves++;
        if(moves>5) break;
    }

    w.style.display="none";
}

// AI
function combinations(a){
    let r=[];
    for(let i=0;i<a.length;i++)
    for(let j=i+1;j<a.length;j++)
    for(let k=j+1;k<a.length;k++)
        r.push([a[i],a[j],a[k]]);
    return r;
}

function score(c,h){
    let r=c.slice(1),s=c[0];
    let sc=h.filter(x=>x.slice(1)==r).length;
    let idx=order.indexOf(r);
    h.forEach(x=>{
        if(x[0]==s && Math.abs(order.indexOf(x.slice(1))-idx)<=2) sc++;
    });
    return sc;
}

function aiTurn(){
    document.getElementById("aiOverlay").style.display="flex";

    setTimeout(()=>{
        let draw = Math.random()<0.5?deck.shift():discard.shift();
        ai.push(draw);
        msg("AI picked a card");

        for(let comb of combinations(ai)){
            if(meldCheck(comb)){
                comb.forEach(c=>ai.splice(ai.indexOf(c),1));
                tableMelds.push(comb);
                msg("AI melded "+comb.join(", "));
                break;
            }
        }

        let worst=ai[0],min=999;
        for(let c of ai){
            let sc=score(c,ai);
            if(sc<min){min=sc;worst=c;}
        }

        ai.splice(ai.indexOf(worst),1);
        discard.unshift(worst);
        msg("AI discarded "+worst);

        render();
        document.getElementById("aiOverlay").style.display="none";
        msg("Your Turn");

    },1200);
}

// START
render();
</script>

</body>
</html>
