<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .hand {
      margin: 20px;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .selected {
      border: 3px solid yellow;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #38bdf8;
      font-weight: bold;
    }

    #log {
      margin-top: 20px;
      min-height: 30px;
    }
  </style>
</head>

<body>

<h1>🎮 Rummy War (Web Version)</h1>

<h3>Your Hand</h3>
<div id="playerHand" class="hand"></div>

<h3>Discard Pile</h3>
<div id="discard"></div>

<div>
  <button onclick="drawDeck()">Draw Deck</button>
  <button onclick="drawDiscard()">Draw Discard</button>
  <button onclick="checkMeld()">Check Meld</button>
</div>

<p id="log"></p>

<script>

const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let selected = [];

// CREATE DECK
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

// SHUFFLE
deck.sort(()=>Math.random()-0.5);

// DEAL
playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// RENDER UI
function render(){
  const handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach((card, index)=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerText = card;

    if(selected.includes(index)){
      el.classList.add("selected");
    }

    el.onclick = ()=>selectCard(index);

    handDiv.appendChild(el);
  });

  document.getElementById("discard").innerText = discardPile[0] || "Empty";
}

// SELECT CARDS
function selectCard(index){
  if(selected.includes(index)){
    selected = selected.filter(i=>i!==index);
  } else {
    if(selected.length < 3){
      selected.push(index);
    }
  }
  render();
}

// MELD CHECK (YOUR LOGIC)
function meldCheck(cardsList){
  let ranks = cardsList.map(c=>c.slice(1));
  let suitsList = cardsList.map(c=>c[0]);

  // SET
  if(ranks[0] === ranks[1] && ranks[1] === ranks[2]){
    return true;
  }

  // RUN
  if(suitsList[0] === suitsList[1] && suitsList[1] === suitsList[2]){
    let idxs = cardsList.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
    return idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2];
  }

  return false;
}

// CHECK MELD BUTTON
function checkMeld(){
  if(selected.length !== 3){
    log("Select exactly 3 cards!");
    return;
  }

  let chosen = selected.map(i=>playerHand[i]);

  if(meldCheck(chosen)){
    log("Valid meld!");

    selected.sort((a,b)=>b-a).forEach(i=>{
      playerHand.splice(i,1);
    });

  } else {
    log("Invalid meld!");
  }

  selected = [];
  render();
}

// DRAW FROM DECK
function drawDeck(){
  if(deck.length === 0){
    log("Deck empty!");
    return;
  }

  playerHand.push(deck.pop());
  log("Drew from deck");
  render();
}

// DRAW FROM DISCARD
function drawDiscard(){
  if(discardPile.length === 0){
    log("Discard empty!");
    return;
  }

  playerHand.push(discardPile.shift());
  log("Drew from discard");
  render();
}

// DISCARD CARD
function discard(index){
  const card = playerHand.splice(index,1)[0];
  discardPile.unshift(card);
  log("You discarded " + card);

  computerTurn();
  render();
}

// COMPUTER TURN (BASIC)
function computerTurn(){
  if(deck.length > 0){
    computerHand.push(deck.pop());
  }

  const discardCard = computerHand.shift();
  discardPile.unshift(discardCard);

  log("Computer discarded " + discardCard);
}

// LOG SYSTEM
function log(text){
  document.getElementById("log").innerText = text;
}

// INIT
render();

</script>

</body>
</html>
