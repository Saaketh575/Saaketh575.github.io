<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy War GOD MODE FINAL</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:black;
    color:white;
}

/* INTRO */
#introScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5000;
}
#introBox{
    max-width:700px;
    padding:30px;
    text-align:center;
}
#startHint{
    margin-top:20px;
    opacity:0.7;
    animation:blink 1s infinite alternate;
}
@keyframes blink{from{opacity:0.3;}to{opacity:1;}}

/* BUTTONS */
button{
    background:#111;
    color:#0ff;
    border:2px solid #0ff;
    padding:10px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
}

/* CARDS */
.card{
    display:inline-block;
    padding:12px;
    margin:5px;
    border:2px solid white;
    border-radius:8px;
    cursor:pointer;
}
.selected{ box-shadow:0 0 15px cyan; }

/* DISCARD */
.discard-card{
    width:80px;height:110px;
    margin:auto;
    border:2px solid red;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MELDS */
.meld{
    display:inline-block;
    border:2px solid cyan;
    padding:8px;
    margin:4px;
}

/* OVERLAY */
#aiOverlay,#warScreen{
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:40px;
    background:rgba(0,0,0,0.9);
    z-index:3000;
}

/* CONFIRM */
#confirmOverlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
<div id="introBox">
<h1>🃏 RUMMY × WAR</h1>
<div id="introText"></div>
<div id="startHint">Click to start</div>
</div>
</div>

<!-- GAME -->
<div id="gameUI" style="display:none">

<div id="msg" style="text-align:center;color:#0ff;">Your Turn</div>

<div style="text-align:center;">
<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="layMeld()">Lay Meld</button>
<button onclick="declareRummy()">Declare Rummy</button>
</div>

<div id="player" style="text-align:center;"></div>

<div style="text-align:center;color:red;">DISCARD PILE</div>
<div id="discard"></div>

<div style="text-align:center;color:cyan;">TABLE MELDS</div>
<div id="melds"></div>

</div>

<!-- CONFIRM -->
<div id="confirmOverlay">
<div style="background:#111;padding:20px;">
<div id="confirmText"></div>
<button onclick="confirmDiscard()">Yes</button>
<button onclick="cancelDiscard()">No</button>
</div>
</div>

<!-- AI -->
<div id="aiOverlay"></div>

<!-- WAR -->
<div id="warScreen">
<div id="warContent"></div>
<div>Click to continue...</div>
</div>

<script>
// ================= INTRO =================
const introLines=[
"Welcome to Rummy + War.",
"A hybrid strategy card game.",
"Invalid melds trigger WAR.",
"Form 2 melds including a run.",
"Declare RUMMY to win."
];

async function typeIntro(){
    let box=document.getElementById("introText");
    for(let line of introLines){
        for(let c of line){
            box.innerHTML+=c;
            await new Promise(r=>setTimeout(r,20));
        }
        box.innerHTML+="<br><br>";
    }
}
typeIntro();

document.onclick=()=>{
    document.getElementById("introScreen").style.display="none";
    document.getElementById("gameUI").style.display="block";
};

// ================= GAME =================
const order=["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits=["♣","♦","♥","♠"];

let deck=[],player=[],ai=[],discard=[];
let selected=[],mustDiscard=false,tableMelds=[];
let playerMelds=[],aiMelds=[];
let pending=null;

// BUILD
for(let s of suits) for(let c of order) deck.push(s+c);
deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// ================= LOGIC =================
function meldCheck(cardlist){
    let r=cardlist.map(c=>c.slice(1));
    if(r[0]==r[1]&&r[1]==r[2]) return true;

    let s=cardlist.map(c=>c[0]);
    let idx=cardlist.map(c=>order.indexOf(c.slice(1))).sort((a,b)=>a-b);

    return s[0]==s[1]&&s[1]==s[2] &&
           idx[0]+1==idx[1]&&idx[1]+1==idx[2];
}

function cardscore(card, hand){
    let suit=card[0],rank=card.slice(1);
    let score=hand.filter(c=>c.slice(1)==rank).length;

    let idx=order.indexOf(rank);
    hand.forEach(c=>{
        if(c[0]==suit && Math.abs(order.indexOf(c.slice(1))-idx)<=2){
            score++;
        }
    });
    return score;
}

function choosediscard(hand){
    return hand.reduce((worst,c)=>{
        return cardscore(c,hand)<cardscore(worst,hand)?c:worst;
    },hand[0]);
}

function isuseful(card, hand){
    for(let i=0;i<hand.length;i++)
    for(let j=i+1;j<hand.length;j++){
        if(meldCheck([card,hand[i],hand[j]])) return true;
    }
    return false;
}

// ================= RENDER =================
function render(){
    let p=document.getElementById("player"); p.innerHTML="";
    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card";
        d.textContent=c;
        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=()=>{
            if(mustDiscard){askDiscard(i);return;}
            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);
            render();
        };
        p.appendChild(d);
    });

    let ddiv=document.getElementById("discard");
    ddiv.innerHTML="";
    if(discard.length){
        let d=document.createElement("div");
        d.className="discard-card";
        d.textContent=discard[0];
        ddiv.appendChild(d);
    }

    let mdiv=document.getElementById("melds");
    mdiv.innerHTML="";
    tableMelds.forEach(m=>{
        let d=document.createElement("div");
        d.className="meld";
        d.textContent=m.join(" ");
        mdiv.appendChild(d);
    });
}

// ================= DRAW =================
function drawDeck(){
    if(mustDiscard)return;
    player.push(deck.shift());
    mustDiscard=true;
    render();
}
function drawDiscard(){
    if(mustDiscard)return;
    player.push(discard.shift());
    mustDiscard=true;
    render();
}

// ================= DISCARD =================
function askDiscard(i){
    pending=i;
    document.getElementById("confirmOverlay").style.display="flex";
    document.getElementById("confirmText").textContent="Discard "+player[i]+"?";
}
function confirmDiscard(){
    discard.unshift(player.splice(pending,1)[0]);
    mustDiscard=false;
    document.getElementById("confirmOverlay").style.display="none";
    render();
    aiTurn();
}
function cancelDiscard(){
    document.getElementById("confirmOverlay").style.display="none";
}

// ================= WAR =================
async function war(){
    let table=[];
    let moves=0;
    let w=document.getElementById("warScreen");
    let c=document.getElementById("warContent");

    w.style.display="flex";

    while(true){
        let p=player.shift();
        let a=ai.shift();

        table.push(p,a);
        c.innerHTML=p+" vs "+a;

        await new Promise(r=>setTimeout(r,800));

        if(order.indexOf(p.slice(1))>order.indexOf(a.slice(1))){
            player.push(...table);
            break;
        }
        if(order.indexOf(p.slice(1))<order.indexOf(a.slice(1))){
            ai.push(...table);
            break;
        }

        if(player.length<4 || ai.length<4){
            break;
        }

        table.push(...player.splice(0,3));
        table.push(...ai.splice(0,3));
        moves++;
        if(moves>5) break;
    }

    w.style.display="none";
}

// ================= AI =================
function aiTurn(){
    setTimeout(()=>{
        let top=discard[0];
        if(isuseful(top,ai)){
            ai.push(discard.shift());
        } else {
            ai.push(deck.shift());
        }

        for(let i=0;i<ai.length;i++)
        for(let j=i+1;j<ai.length;j++)
        for(let k=j+1;k<ai.length;k++){
            let m=[ai[i],ai[j],ai[k]];
            if(meldCheck(m)){
                m.forEach(c=>ai.splice(ai.indexOf(c),1));
                tableMelds.push(m);
                break;
            }
        }

        let d=choosediscard(ai);
        ai.splice(ai.indexOf(d),1);
        discard.unshift(d);

        render();
    },1000);
}

// ================= RUMMY =================
function declareRummy(){
    if(tableMelds.length<2) return;
    let hasRun=tableMelds.some(m=>{
        let s=m.map(c=>c[0]);
        let i=m.map(c=>order.indexOf(c.slice(1))).sort((a,b)=>a-b);
        return s[0]==s[1]&&i[0]+1==i[1]&&i[1]+1==i[2];
    });
    if(!hasRun){
        war();
        return;
    }
    alert("YOU WIN");
}

// START
render();
</script>

</body>
</html>
