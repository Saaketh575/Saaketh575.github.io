<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      font-weight: bold;
    }

    .selected {
      border: 3px solid yellow;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
    }

    #warZone {
      display: none;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>🎮 Rummy War</h1>

<div id="game">

<h3>Your Hand</h3>
<div id="playerHand"></div>

<h3>Discard</h3>
<div id="discard"></div>

<button onclick="drawDeck()">Draw Deck</button>
<button onclick="checkMeld()">Check Meld</button>

<p id="log"></p>

</div>

<div id="warZone">
  <h2>⚔️ WAR!</h2>
  <div id="warCards"></div>
  <button onclick="playWar()">Play War Round</button>
</div>

<script>

// ---------- DATA ----------
const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let selected = [];
let phase = "draw";

// WAR STATE
let inWar = false;
let warPile = [];

// ---------- INIT ----------
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

deck.sort(()=>Math.random()-0.5);

playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// ---------- RENDER ----------
function render(){
  let handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach((card, index)=>{
    let el = document.createElement("div");
    el.className = "card";
    el.innerText = card;

    if(selected.includes(index)){
      el.classList.add("selected");
    }

    el.onclick = ()=>{
      if(phase === "draw"){
        selectCard(index);
      }
    };

    handDiv.appendChild(el);
  });

  document.getElementById("discard").innerText = discardPile[0] || "Empty";
}

// ---------- SELECT ----------
function selectCard(index){
  if(selected.includes(index)){
    selected = selected.filter(i=>i!==index);
  } else {
    if(selected.length < 3){
      selected.push(index);
    }
  }
  render();
}

// ---------- MELD ----------
function meldCheck(list){
  let ranks = list.map(c=>c.slice(1));
  let suitsList = list.map(c=>c[0]);

  if(ranks[0] === ranks[1] && ranks[1] === ranks[2]) return true;

  if(suitsList[0] === suitsList[1] && suitsList[1] === suitsList[2]){
    let idxs = list.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
    return idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2];
  }

  return false;
}

function checkMeld(){
  if(selected.length !== 3){
    log("Select 3 cards!");
    return;
  }

  let chosen = selected.map(i=>playerHand[i]);

  if(meldCheck(chosen)){
    log("Valid meld!");
  } else {
    log("Invalid meld → WAR!");
    startWar();
  }

  selected = [];
}

// ---------- DRAW ----------
function drawDeck(){
  if(phase !== "draw"){
    log("Finish turn first!");
    return;
  }

  playerHand.push(deck.pop());
  phase = "action";

  render();
}

// ---------- WAR ----------
function startWar(){
  inWar = true;

  document.getElementById("game").style.display = "none";
  document.getElementById("warZone").style.display = "block";

  warPile = [];
}

function playWar(){
  if(playerHand.length === 0 || computerHand.length === 0){
    endWar("tie");
    return;
  }

  let p = playerHand.shift();
  let c = computerHand.shift();

  warPile.push(p, c);

  document.getElementById("warCards").innerText =
    "Player: " + p + " vs Computer: " + c;

  let pVal = cards.indexOf(p.slice(1));
  let cVal = cards.indexOf(c.slice(1));

  if(pVal > cVal){
    endWar("player");
  } else if(cVal > pVal){
    endWar("computer");
  } else {
    log("War continues!");
  }
}

function endWar(winner){
  if(winner === "player"){
    playerHand.push(...warPile);
    log("You win the war!");
  } else if(winner === "computer"){
    computerHand.push(...warPile);
    log("Computer wins the war!");
  } else {
    log("War tie!");
  }

  document.getElementById("game").style.display = "block";
  document.getElementById("warZone").style.display = "none";

  inWar = false;
  phase = "draw";
  render();
}

// ---------- LOG ----------
function log(text){
  document.getElementById("log").innerText = text;
}

// ---------- START ----------
render();

</script>

</body>
</html>
