<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .selected {
      border: 3px solid yellow;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    #log {
      margin-top: 20px;
      min-height: 30px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
    }
  </style>
</head>

<body>

<h1>🎮 Rummy War</h1>

<h3>Your Hand</h3>
<div id="playerHand"></div>

<h3>Discard Pile</h3>
<div id="discard"></div>

<h3>Your Melds</h3>
<div id="melds"></div>

<div>
  <button onclick="drawDeck()">Draw Deck</button>
  <button onclick="drawDiscard()">Draw Discard</button>
  <button onclick="checkMeld()">Check Meld</button>
</div>

<p id="log"></p>

<!-- DISCARD MODAL -->
<div class="modal" id="discardModal">
  <div class="modal-content">
    <h3 id="discardText"></h3>
    <button onclick="confirmDiscard()">Yes</button>
    <button onclick="cancelDiscard()">No</button>
  </div>
</div>

<script>

// ---------- DATA ----------
const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let playerMelds = [];
let selected = [];

let playerTurn = true;
let phase = "draw";

let pendingDiscardIndex = null;

// ---------- INIT ----------
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

deck.sort(()=>Math.random()-0.5);

playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// ---------- RENDER ----------
function render(){
  let handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach((card, index)=>{
    let el = document.createElement("div");
    el.className = "card";
    el.innerText = card;

    if(selected.includes(index)){
      el.classList.add("selected");
    }

    el.onclick = ()=>{
      if(phase !== "draw"){
        openDiscardModal(index);
      } else {
        selectCard(index);
      }
    };

    handDiv.appendChild(el);
  });

  document.getElementById("discard").innerText = discardPile[0] || "Empty";

  document.getElementById("melds").innerHTML =
    playerMelds.map(m => "[" + m.join(", ") + "]").join("<br>");
}

// ---------- SELECT ----------
function selectCard(index){
  if(!playerTurn) return;

  if(selected.includes(index)){
    selected = selected.filter(i=>i!==index);
  } else {
    if(selected.length < 3){
      selected.push(index);
    }
  }
  render();
}

// ---------- MELD ----------
function meldCheck(list){
  let ranks = list.map(c=>c.slice(1));
  let suitsList = list.map(c=>c[0]);

  if(ranks[0] === ranks[1] && ranks[1] === ranks[2]){
    return true;
  }

  if(suitsList[0] === suitsList[1] && suitsList[1] === suitsList[2]){
    let idxs = list.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
    return idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2];
  }

  return false;
}

function checkMeld(){
  if(phase === "draw"){
    log("Draw first!");
    return;
  }

  if(selected.length !== 3){
    log("Select exactly 3 cards!");
    return;
  }

  let chosen = selected.map(i=>playerHand[i]);

  if(meldCheck(chosen)){
    log("Valid meld!");
    playerMelds.push(chosen);

    selected.sort((a,b)=>b-a).forEach(i=>{
      playerHand.splice(i,1);
    });

  } else {
    log("Invalid meld!");
  }

  selected = [];
  render();
}

// ---------- DRAW ----------
function drawDeck(){
  if(phase !== "draw"){
    log("Finish your turn first!");
    return;
  }

  if(deck.length === 0){
    log("Deck empty!");
    return;
  }

  playerHand.push(deck.pop());
  phase = "action";

  log("Drew from deck → now play or discard");
  render();
}

function drawDiscard(){
  if(phase !== "draw"){
    log("Finish your turn first!");
    return;
  }

  if(discardPile.length === 0){
    log("Discard empty!");
    return;
  }

  playerHand.push(discardPile.shift());
  phase = "action";

  log("Drew from discard → now play or discard");
  render();
}

// ---------- DISCARD MODAL ----------
function openDiscardModal(index){
  pendingDiscardIndex = index;
  document.getElementById("discardText").innerText =
    "Discard " + playerHand[index] + "?";
  document.getElementById("discardModal").style.display = "flex";
}

function confirmDiscard(){
  let index = pendingDiscardIndex;
  let card = playerHand.splice(index,1)[0];

  discardPile.unshift(card);

  playerTurn = false;
  phase = "draw";

  log("You discarded " + card);

  document.getElementById("discardModal").style.display = "none";

  setTimeout(computerTurn, 800);
}

function cancelDiscard(){
  document.getElementById("discardModal").style.display = "none";
  log("Discard cancelled");
}

// ---------- COMPUTER ----------
function computerTurn(){
  if(deck.length > 0){
    computerHand.push(deck.pop());
  }

  let discardCard = computerHand.shift();
  discardPile.unshift(discardCard);

  log("Computer discarded " + discardCard);

  playerTurn = true;
  phase = "draw";

  render();
}

// ---------- LOG ----------
function log(text){
  document.getElementById("log").innerText = text;
}

// ---------- START ----------
render();

</script>

</body>
</html>
