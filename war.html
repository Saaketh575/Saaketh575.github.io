<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy + War</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background: radial-gradient(circle, #000, #111);
    color:white;
}

/* MESSAGE */
#msg {
    text-align:center;
    padding:10px;
    background:#111;
    color:#0ff;
}

/* GAME */
#game { text-align:center; padding:20px; }

/* CARDS */
.card {
    display:inline-block;
    padding:15px;
    margin:5px;
    border:2px solid white;
    border-radius:10px;
    cursor:pointer;
}
.selected { box-shadow:0 0 20px cyan; }

/* DISCARD */
#discard-area { margin-top:30px; }
#discard-label { color:red; font-size:20px; }

.discard-card {
    width:90px; height:120px;
    border:2px solid red;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px red;
}

/* CONFIRM */
#confirmBox {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:15px;
    display:none;
}

/* WAR */
#warScreen {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

/* AI OVERLAY */
#aiOverlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:yellow;
}
</style>
</head>

<body>

<div id="msg">Your Turn</div>

<div id="game">
<h1>Rummy + War</h1>

<div id="player"></div>

<div id="discard-area">
<div id="discard-label">DISCARD PILE</div>
<div id="discard"></div>
</div>

<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="layMeld()">Lay Meld</button>
</div>

<div id="confirmBox">
<span id="confirmText"></span><br>
<button onclick="confirmDiscard()">Yes</button>
<button onclick="cancelDiscard()">No</button>
</div>

<div id="warScreen"></div>
<div id="aiOverlay">AI THINKING...</div>

<script>
// -------- GLOBAL --------
const order=["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits=["♣","♦","♥","♠"];

let deck=[],player=[],ai=[],discard=[];
let selected=[],mustDiscard=false;
let pendingIndex=null,pendingEl=null;

// DECK
for(let s of suits) for(let c of order) deck.push(s+c);
deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// -------- MSG --------
function msg(t){ document.getElementById("msg").textContent=t; }

// -------- RENDER --------
function render(){
    let p=document.getElementById("player"); p.innerHTML="";
    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card"; d.textContent=c;

        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=(e)=>{
            if(mustDiscard){ askDiscard(i,e.target); return; }
            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);
            render();
        };

        p.appendChild(d);
    });

    let ddiv=document.getElementById("discard");
    ddiv.innerHTML="";
    if(discard.length){
        let d=document.createElement("div");
        d.className="discard-card";
        d.textContent=discard[0];
        ddiv.appendChild(d);
    }
}

// -------- DRAW --------
function drawDeck(){
    if(mustDiscard){ msg("Discard first"); return; }
    player.push(deck.shift());
    mustDiscard=true;
    msg("Choose a card to discard");
    render();
}
function drawDiscard(){
    if(mustDiscard){ msg("Discard first"); return; }
    player.push(discard.shift());
    mustDiscard=true;
    msg("Choose a card to discard");
    render();
}

// -------- DISCARD --------
function askDiscard(i,el){
    pendingIndex=i; pendingEl=el;
    document.getElementById("confirmText").textContent="Discard "+player[i]+"?";
    document.getElementById("confirmBox").style.display="block";
}
function confirmDiscard(){
    document.getElementById("confirmBox").style.display="none";
    discard.unshift(player.splice(pendingIndex,1)[0]);
    mustDiscard=false;
    render();
    aiTurn();
}
function cancelDiscard(){
    document.getElementById("confirmBox").style.display="none";
}

// -------- MELD --------
function meldCheck(c){
    if(c.length!=3)return false;
    let r=c.map(x=>x.slice(1));
    if(r[0]==r[1]&&r[1]==r[2])return true;
    let s=c.map(x=>x[0]);
    if(s[0]==s[1]&&s[1]==s[2]){
        let i=c.map(x=>order.indexOf(x.slice(1))).sort((a,b)=>a-b);
        return i[0]+1==i[1]&&i[1]+1==i[2];
    }
    return false;
}

async function layMeld(){
    if(selected.length!=3){ msg("Select 3 cards"); return; }

    let m=selected.map(i=>player[i]);

    if(meldCheck(m)){
        selected.sort((a,b)=>b-a).forEach(i=>player.splice(i,1));
        msg("Meld placed!");
    } else {
        msg("Invalid meld → WAR!");
        await warGame();
    }

    selected=[];
    mustDiscard=false;
    render();
    aiTurn();
}

// -------- TYPEWRITER --------
async function type(text){
    let w=document.getElementById("warScreen");
    w.innerHTML="";
    for(let c of text){
        w.innerHTML+=c;
        await new Promise(r=>setTimeout(r,40));
    }
}

// -------- WAR (REAL) --------
async function warGame(){
    let w=document.getElementById("warScreen");
    w.style.display="flex";

    let table=[],moves=0;

    while(true){
        if(player.length<2||ai.length<2){
            await type("TIE");
            break;
        }

        let p=player.shift();
        let c=ai.shift();

        table.push(p,c);

        await type(p+" vs "+c);

        if(order.indexOf(p.slice(1))>order.indexOf(c.slice(1))){
            await type("PLAYER WINS ROUND");
            player.push(...table);
            table=[]; moves++;
        } else if(order.indexOf(p.slice(1))<order.indexOf(c.slice(1))){
            await type("AI WINS ROUND");
            ai.push(...table);
            table=[]; moves++;
        } else {
            await type("WAR!");
            if(player.length<4||ai.length<4){
                await type("TIE");
                break;
            }
            table.push(...player.splice(0,3),...ai.splice(0,3));
        }

        if(moves>=10){
            if(player.length>ai.length){
                await type("PLAYER WINS WAR");
                player.push(...deck.splice(0,1));
            } else {
                await type("AI WINS WAR");
                ai.push(...deck.splice(0,1));
            }
            break;
        }
    }

    await new Promise(r=>setTimeout(r,1000));
    w.style.display="none";
}

// -------- AI --------
function aiTurn(){
    let overlay=document.getElementById("aiOverlay");
    overlay.style.display="flex";

    setTimeout(()=>{
        // simple smart discard
        let worst=ai[0];
        ai.splice(ai.indexOf(worst),1);
        discard.unshift(worst);

        render();
        overlay.style.display="none";
        msg("Your Turn");
    },1200);
}

// -------- START --------
render();
</script>

</body>
</html>
