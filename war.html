<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .card:hover { transform: scale(1.1); }

    .selected { border: 3px solid yellow; }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    #log { margin-top: 20px; min-height: 30px; }

    #computerStatus {
      margin-top: 10px;
      color: #38bdf8;
      font-weight: bold;
    }

    /* DISCARD ELITE */
    .discard-box {
      display:inline-block;
      padding:20px;
      background:#1e293b;
      border-radius:12px;
      cursor:pointer;
      min-width:100px;
      position: relative;
      transition: 0.3s;
    }

    .discard-box:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #38bdf8;
      background:#334155;
    }

    .stack-preview {
      position: absolute;
      top: -10px;
      left: 10px;
      display: flex;
      gap: 5px;
    }

    .mini-card {
      background: #94a3b8;
      color: black;
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 10px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
    }

    /* WAR */
    #warZone { display: none; margin-top: 30px; }
  </style>
</head>

<body>

<h1>🎮 Rummy War</h1>

<div id="game">

<h3>Your Hand</h3>
<div id="playerHand"></div>

<!-- DISCARD -->
<h3>🗂 Discard Pile</h3>
<p style="color:#94a3b8; font-size:14px;">
  Pick up the top card from here instead of drawing from the deck.
</p>

<div id="discard" class="discard-box" onclick="drawDiscard()">
  <div id="stackPreview" class="stack-preview"></div>
  <div id="discardTop"></div>
</div>

<h3>Your Melds</h3>
<div id="melds"></div>

<div>
  <button onclick="drawDeck()">Draw Deck</button>
  <button onclick="checkMeld()">Check Meld</button>
</div>

<p id="log"></p>
<div id="computerStatus"></div>

</div>

<!-- WAR -->
<div id="warZone">
  <h2>⚔️ WAR!</h2>
  <div id="warCards"></div>
  <button onclick="playWar()">Play War Round</button>
</div>

<!-- MODAL -->
<div class="modal" id="discardModal">
  <div class="modal-content">
    <h3 id="discardText"></h3>
    <button onclick="confirmDiscard()">Yes</button>
    <button onclick="cancelDiscard()">No</button>
  </div>
</div>

<script>

// ---------- DATA ----------
const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let playerMelds = [];
let selected = [];

let playerTurn = true;
let phase = "draw";

let pendingDiscardIndex = null;

// WAR
let warPile = [];

// ---------- INIT ----------
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

deck.sort(()=>Math.random()-0.5);

playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// ---------- RENDER ----------
function render(){
  let handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach((card, index)=>{
    let el = document.createElement("div");
    el.className = "card";
    el.innerText = card;

    if(selected.includes(index)){
      el.classList.add("selected");
    }

    el.onclick = ()=>{
      if(phase !== "draw"){
        openDiscardModal(index);
      } else {
        selectCard(index);
      }
    };

    handDiv.appendChild(el);
  });

  // DISCARD UI
  let topEl = document.getElementById("discardTop");
  let previewEl = document.getElementById("stackPreview");

  topEl.innerText = discardPile[0] || "Empty";

  previewEl.innerHTML = "";
  discardPile.slice(1,4).forEach(card=>{
    let mini = document.createElement("div");
    mini.className = "mini-card";
    mini.innerText = card;
    previewEl.appendChild(mini);
  });

  document.getElementById("melds").innerHTML =
    playerMelds.map(m => "[" + m.join(", ") + "]").join("<br>");
}

// ---------- SELECT ----------
function selectCard(index){
  if(selected.includes(index)){
    selected = selected.filter(i=>i!==index);
  } else {
    if(selected.length < 3){
      selected.push(index);
    }
  }
  render();
}

// ---------- MELD ----------
function meldCheck(list){
  let ranks = list.map(c=>c.slice(1));
  let suitsList = list.map(c=>c[0]);

  if(ranks[0] === ranks[1] && ranks[1] === ranks[2]) return true;

  if(suitsList[0] === suitsList[1] && suitsList[1] === suitsList[2]){
    let idxs = list.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
    return idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2];
  }

  return false;
}

function checkMeld(){
  if(phase === "draw"){
    log("Draw first!");
    return;
  }

  if(selected.length !== 3){
    log("Select exactly 3 cards!");
    return;
  }

  let chosen = selected.map(i=>playerHand[i]);

  if(meldCheck(chosen)){
    log("Valid meld!");
    playerMelds.push(chosen);

    selected.sort((a,b)=>b-a).forEach(i=>{
      playerHand.splice(i,1);
    });

  } else {
    log("Invalid meld → WAR!");
    startWar();
  }

  selected = [];
  render();
}

// ---------- DRAW ----------
function drawDeck(){
  if(phase !== "draw"){
    log("Finish your turn first!");
    return;
  }

  playerHand.push(deck.pop());
  phase = "action";

  log("Drew from deck → now play or discard");
  render();
}

function drawDiscard(){
  if(phase !== "draw"){
    log("Finish your turn first!");
    return;
  }

  if(discardPile.length === 0){
    log("Nothing to take.");
    return;
  }

  playerHand.push(discardPile.shift());
  phase = "action";

  log("Took card from discard pile");
  render();
}

// ---------- DISCARD ----------
function openDiscardModal(index){
  pendingDiscardIndex = index;
  document.getElementById("discardText").innerText =
    "Discard " + playerHand[index] + "?";
  document.getElementById("discardModal").style.display = "flex";
}

function confirmDiscard(){
  let index = pendingDiscardIndex;
  let card = playerHand.splice(index,1)[0];

  discardPile.unshift(card);

  playerTurn = false;
  phase = "draw";

  log("You discarded " + card);

  document.getElementById("discardModal").style.display = "none";

  setTimeout(computerTurn, 800);
}

function cancelDiscard(){
  document.getElementById("discardModal").style.display = "none";
}

// ---------- COMPUTER ----------
function computerTurn(){

  const status = document.getElementById("computerStatus");

  status.innerText = "🤖 Computer is thinking...";

  setTimeout(() => {

    let drawnCard;

    if(deck.length > 0){
      drawnCard = deck.pop();
      computerHand.push(drawnCard);
    }

    status.innerText = "🤖 Computer drew a card";

    setTimeout(() => {

      let discardCard = computerHand.shift();
      discardPile.unshift(discardCard);

      status.innerText = "🤖 Computer discarded " + discardCard;

      log("Your turn");

      playerTurn = true;
      phase = "draw";

      render();

    }, 800);

  }, 800);
}

// ---------- WAR ----------
function startWar(){
  document.getElementById("game").style.display = "none";
  document.getElementById("warZone").style.display = "block";
  warPile = [];
}

function playWar(){
  if(playerHand.length === 0 || computerHand.length === 0){
    endWar("tie");
    return;
  }

  let p = playerHand.shift();
  let c = computerHand.shift();

  warPile.push(p,c);

  document.getElementById("warCards").innerText =
    "Player: " + p + " vs Computer: " + c;

  let pVal = cards.indexOf(p.slice(1));
  let cVal = cards.indexOf(c.slice(1));

  if(pVal > cVal){
    endWar("player");
  } else if(cVal > pVal){
    endWar("computer");
  }
}

function endWar(winner){
  if(winner === "player"){
    playerHand.push(...warPile);
    log("You win the war!");
  } else if(winner === "computer"){
    computerHand.push(...warPile);
    log("Computer wins the war!");
  } else {
    log("War tie!");
  }

  document.getElementById("game").style.display = "block";
  document.getElementById("warZone").style.display = "none";

  phase = "draw";
  render();
}

// ---------- LOG ----------
function log(text){
  document.getElementById("log").innerText = text;
}

// ---------- START ----------
render();

</script>

</body>
</html>
