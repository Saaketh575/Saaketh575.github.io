<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy + War GOD MODE FINAL</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background: radial-gradient(circle, #000, #111);
    color:white;
    overflow:hidden;
}

/* GAME AREA */
#game {
    padding:20px;
    text-align:center;
}

/* CARDS */
.card {
    display:inline-block;
    padding:15px;
    margin:5px;
    border:2px solid white;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}
.card:hover { transform:scale(1.2); }
.selected { box-shadow:0 0 20px cyan; }

/* BUTTONS */
button {
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

/* WAR SCREEN */
#warScreen {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:50px;
    text-align:center;
    z-index:9999;
}

/* FLASH */
.flash {
    animation: flash 0.3s;
}
@keyframes flash {
    0%{background:white;color:black;}
    100%{background:black;color:white;}
}
</style>
</head>

<body>

<div id="game">
    <h1>Rummy + War</h1>

    <div id="player"></div>
    <div id="discard"></div>

    <button onclick="drawDeck()">Draw Deck</button>
    <button onclick="drawDiscard()">Draw Discard</button>
    <button onclick="layMeld()">Lay Meld</button>
</div>

<div id="warScreen"></div>

<script>
// ---------------- GLOBAL ----------------
const order = ["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits = ["♣","♦","♥","♠"];

let deck=[], player=[], ai=[], discard=[];
let selected=[], mustDiscard=false;

// BUILD DECK
for(let s of suits){
    for(let c of order) deck.push(s+c);
}
deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// ---------------- RENDER ----------------
function render(){
    let p=document.getElementById("player");
    p.innerHTML="";

    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card";
        d.textContent=c;

        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=()=>{
            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);
            render();
        };

        p.appendChild(d);
    });

    document.getElementById("discard").innerHTML="Top: "+discard[0];
}

// ---------------- TYPEWRITER ----------------
async function typeText(text){
    let war=document.getElementById("warScreen");
    war.innerHTML="";
    for(let c of text){
        war.innerHTML+=c;
        await new Promise(r=>setTimeout(r,40));
    }
}

// ---------------- WAR ----------------
async function warGame(){
    let war=document.getElementById("warScreen");
    war.style.display="flex";

    await typeText("⚔️ WAR ⚔️");
    await delay(800);

    let table=[], moves=0;

    while(true){
        if(player.length<2||ai.length<2){
            await typeText("TIE");
            break;
        }

        let p=player.shift();
        let c=ai.shift();
        table.push(p,c);

        war.classList.add("flash");

        if(order.indexOf(p.slice(1))>order.indexOf(c.slice(1))){
            await typeText("PLAYER WINS ROUND");
            player.push(...table); table=[];
            moves++;
        } else if(order.indexOf(p.slice(1))<order.indexOf(c.slice(1))){
            await typeText("AI WINS ROUND");
            ai.push(...table); table=[];
            moves++;
        } else {
            await typeText("WAR!");
            if(player.length<4||ai.length<4){
                await typeText("TIE");
                break;
            }
            table.push(...player.splice(0,3),...ai.splice(0,3));
        }

        if(moves>=10){
            if(player.length>ai.length){
                await typeText("PLAYER WINS WAR");
                player.push(...deck.splice(0,1));
            } else {
                await typeText("AI WINS WAR");
                ai.push(...deck.splice(0,1));
            }
            break;
        }

        await delay(700);
    }

    await delay(1000);
    war.style.display="none";
}

// ---------------- DELAY ----------------
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ---------------- MELD CHECK ----------------
function meldCheck(cards){
    if(cards.length!=3) return false;

    let r=cards.map(c=>c.slice(1));
    if(r[0]==r[1]&&r[1]==r[2]) return true;

    let s=cards.map(c=>c[0]);
    if(s[0]==s[1]&&s[1]==s[2]){
        let idx=cards.map(c=>order.indexOf(c.slice(1))).sort((a,b)=>a-b);
        return idx[0]+1==idx[1]&&idx[1]+1==idx[2];
    }
    return false;
}

// ---------------- DRAW FIX ----------------
function drawDeck(){
    if(mustDiscard) return alert("Discard first!");
    player.push(deck.shift());
    mustDiscard=true;
    render();
}

function drawDiscard(){
    if(mustDiscard) return alert("Discard first!");
    player.push(discard.shift());
    mustDiscard=true;
    render();
}

// ---------------- DISCARD ----------------
function discardCard(i){
    discard.unshift(player.splice(i,1)[0]);
    mustDiscard=false;
    aiTurn();
}

// ---------------- MELD ----------------
async function layMeld(){
    if(selected.length!=3) return;

    let m=selected.map(i=>player[i]);

    if(meldCheck(m)){
        selected.sort((a,b)=>b-a).forEach(i=>player.splice(i,1));
    } else {
        await warGame();
    }

    selected=[];
    mustDiscard=false;
    aiTurn();
}

// ---------------- AI (SMART) ----------------
function combinations(arr){
    let res=[];
    for(let i=0;i<arr.length;i++){
        for(let j=i+1;j<arr.length;j++){
            for(let k=j+1;k<arr.length;k++){
                res.push([arr[i],arr[j],arr[k]]);
            }
        }
    }
    return res;
}

function cardScore(card,hand){
    let rank=card.slice(1);
    let suit=card[0];
    let score=hand.filter(c=>c.slice(1)==rank).length;

    let idx=order.indexOf(rank);
    hand.forEach(c=>{
        if(c[0]==suit && Math.abs(order.indexOf(c.slice(1))-idx)<=2){
            score++;
        }
    });
    return score;
}

function aiTurn(){
    setTimeout(()=>{

        // try meld
        for(let comb of combinations(ai)){
            if(meldCheck(comb)){
                comb.forEach(c=>ai.splice(ai.indexOf(c),1));
                break;
            }
        }

        // smart discard
        let worst=ai[0];
        let min=999;
        for(let c of ai){
            let sc=cardScore(c,ai);
            if(sc<min){ min=sc; worst=c; }
        }

        ai.splice(ai.indexOf(worst),1);
        discard.unshift(worst);

        render();

    },800);
}

// ---------------- START ----------------
render();
</script>

</body>
</html>
