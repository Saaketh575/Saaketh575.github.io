<!DOCTYPE html>
<html>
<head>
  <title>Rummy War Game</title>
  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      display: inline-block;
      padding: 12px;
      margin: 6px;
      background: white;
      color: black;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .selected {
      border: 3px solid yellow;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎮 Rummy War</h1>

<h3>Your Hand</h3>
<div id="playerHand"></div>

<h3>Discard Pile</h3>
<div id="discard"></div>

<h3>Your Melds</h3>
<div id="melds"></div>

<div>
  <button onclick="drawDeck()">Draw Deck</button>
  <button onclick="drawDiscard()">Draw Discard</button>
  <button onclick="checkMeld()">Check Meld</button>
</div>

<p id="log"></p>

<script>

// ---------- GAME DATA ----------
const cards = ["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits = ["♣","♦","♥","♠"];

let deck = [];
let playerHand = [];
let computerHand = [];
let discardPile = [];

let playerMelds = [];

let selected = [];

// ---------- TURN STATE ----------
let hasDrawn = false;
let playerTurn = true;

// ---------- INIT ----------
for (let s of suits){
  for (let c of cards){
    deck.push(s+c);
  }
}

deck.sort(()=>Math.random()-0.5);

playerHand = deck.splice(0,7);
computerHand = deck.splice(0,7);
discardPile.push(deck.pop());

// ---------- RENDER ----------
function render(){
  let handDiv = document.getElementById("playerHand");
  handDiv.innerHTML = "";

  playerHand.forEach((card, index)=>{
    let el = document.createElement("div");
    el.className = "card";
    el.innerText = card;

    if(selected.includes(index)){
      el.classList.add("selected");
    }

    el.onclick = ()=>{
      if(hasDrawn){
        discard(index);
      } else {
        selectCard(index);
      }
    };

    handDiv.appendChild(el);
  });

  document.getElementById("discard").innerText = discardPile[0] || "Empty";

  document.getElementById("melds").innerHTML =
    playerMelds.map(m => "[" + m.join(", ") + "]").join("<br>");
}

// ---------- SELECT ----------
function selectCard(index){
  if(!playerTurn) return;

  if(selected.includes(index)){
    selected = selected.filter(i=>i!==index);
  } else {
    if(selected.length < 3){
      selected.push(index);
    }
  }
  render();
}

// ---------- MELD ----------
function meldCheck(list){
  let ranks = list.map(c=>c.slice(1));
  let suitsList = list.map(c=>c[0]);

  // set
  if(ranks[0] === ranks[1] && ranks[1] === ranks[2]){
    return true;
  }

  // run
  if(suitsList[0] === suitsList[1] && suitsList[1] === suitsList[2]){
    let idxs = list.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
    return idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2];
  }

  return false;
}

function checkMeld(){
  if(!playerTurn){
    log("Not your turn!");
    return;
  }

  if(selected.length !== 3){
    log("Select exactly 3 cards!");
    return;
  }

  let chosen = selected.map(i=>playerHand[i]);

  if(meldCheck(chosen)){
    log("Valid meld!");

    playerMelds.push(chosen);

    selected.sort((a,b)=>b-a).forEach(i=>{
      playerHand.splice(i,1);
    });

  } else {
    log("Invalid meld!");
  }

  selected = [];
  render();
}

// ---------- DRAW ----------
function drawDeck(){
  if(!playerTurn) return;

  if(hasDrawn){
    log("Already drew! Now discard.");
    return;
  }

  if(deck.length === 0){
    log("Deck empty!");
    return;
  }

  playerHand.push(deck.pop());
  hasDrawn = true;

  log("Drew from deck. Now discard.");
  render();
}

function drawDiscard(){
  if(!playerTurn) return;

  if(hasDrawn){
    log("Already drew! Now discard.");
    return;
  }

  if(discardPile.length === 0){
    log("Discard empty!");
    return;
  }

  playerHand.push(discardPile.shift());
  hasDrawn = true;

  log("Drew from discard. Now discard.");
  render();
}

// ---------- DISCARD ----------
function discard(index){
  if(!hasDrawn){
    log("You must draw first!");
    return;
  }

  const card = playerHand.splice(index,1)[0];
  discardPile.unshift(card);

  hasDrawn = false;
  playerTurn = false;

  log("You discarded " + card);

  setTimeout(computerTurn, 800);
}

// ---------- COMPUTER ----------
function computerTurn(){
  // draw
  if(deck.length > 0){
    computerHand.push(deck.pop());
  }

  // discard simple
  let discardCard = computerHand.shift();
  discardPile.unshift(discardCard);

  log("Computer discarded " + discardCard);

  playerTurn = true;
  render();
}

// ---------- LOG ----------
function log(text){
  document.getElementById("log").innerText = text;
}

// ---------- START ----------
render();

</script>

</body>
</html>
