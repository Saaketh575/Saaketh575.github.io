<!DOCTYPE html>
<html>
<head>
<title>Rummy War - Full Port</title>

<style>
body {background:#020617;color:white;font-family:Arial;text-align:center;}
.card {display:inline-block;padding:10px;margin:5px;background:white;color:black;border-radius:8px;cursor:pointer;}
.selected {border:3px solid yellow;}
button {padding:10px;margin:10px;background:#38bdf8;border:none;border-radius:8px;}

#compOverlay{
position:fixed;width:100%;height:100%;background:black;
display:none;justify-content:center;align-items:center;flex-direction:column;
}

</style>
</head>

<body>

<h2>🎮 Rummy War (Full Port)</h2>

<div id="playerHand"></div>

<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="checkMeld()">Check Meld</button>

<p id="log"></p>

<div id="compOverlay">
  <h2 id="compText"></h2>
  <h1 id="compCard"></h1>
</div>

<script>

// ---------- DATA ----------
const cards=["2","3","4","5","6","7","8","9","X","J","Q","K","A"];
const suits=["♣","♦","♥","♠"];

let deck=[], playerHand=[], computerHand=[], discardPile=[];
let selected=[], playerMelds=[], computerMelds=[];
let phase="draw";

// ---------- INIT ----------
for(let s of suits){
 for(let c of cards){
  deck.push(s+c);
 }
}
deck.sort(()=>Math.random()-0.5);

playerHand=deck.splice(0,7);
computerHand=deck.splice(0,7);
discardPile=[deck.pop()];

// ---------- RENDER ----------
function render(){
 let div=document.getElementById("playerHand");
 div.innerHTML="";

 playerHand.forEach((c,i)=>{
  let el=document.createElement("div");
  el.className="card";
  el.innerText=c;

  if(selected.includes(i)) el.classList.add("selected");

  el.onclick=()=>{
   if(phase==="draw") toggleSelect(i);
  };

  div.appendChild(el);
 });
}

// ---------- SELECT ----------
function toggleSelect(i){
 if(selected.includes(i)){
  selected=selected.filter(x=>x!==i);
 } else if(selected.length<3){
  selected.push(i);
 }
 render();
}

// ---------- MELD ----------
function meldCheck(list){
 let ranks=list.map(c=>c.slice(1));
 let suitsL=list.map(c=>c[0]);

 if(ranks[0]===ranks[1] && ranks[1]===ranks[2]) return true;

 if(suitsL[0]===suitsL[1] && suitsL[1]===suitsL[2]){
  let idx=list.map(c=>cards.indexOf(c.slice(1))).sort((a,b)=>a-b);
  return idx[0]+1===idx[1] && idx[1]+1===idx[2];
 }
 return false;
}

// ---------- SMART AI ----------
function cardscore(card, hand){
 let suit=card[0], rank=card.slice(1);
 let score=0;

 let same=hand.filter(c=>c.slice(1)===rank);
 score+=same.length;

 let idx=cards.indexOf(rank);
 for(let k of [-2,-1,1,2]){
  for(let c of hand){
   if(c[0]===suit && cards.indexOf(c.slice(1))===idx+k){
    score++;
   }
  }
 }
 return score;
}

function choosediscard(hand){
 let scores=hand.map(c=>[cardscore(c,hand),c]);
 scores.sort((a,b)=>a[0]-b[0]);
 return scores[0][1];
}

// ---------- REAL WAR ----------
function runWar(){

 let table=[];
 let moves=0;

 while(true){

  if(playerHand.length<1 || computerHand.length<1){
    log("War ends (not enough cards)");
    return;
  }

  let p=playerHand.shift();
  let c=computerHand.shift();

  table.push(p,c);

  let pi=cards.indexOf(p.slice(1));
  let ci=cards.indexOf(c.slice(1));

  if(pi>ci){
    log("⚔️ You win the war round!");
    playerHand.push(...table);
    return;
  }

  else if(pi<ci){
    log("⚔️ Computer wins the war round!");
    computerHand.push(...table);
    return;
  }

  else{
    log("⚔️ WAR TIE!");
    if(playerHand.length<3 || computerHand.length<3){
      log("War tie unresolved");
      return;
    }

    table.push(...playerHand.splice(0,3));
    table.push(...computerHand.splice(0,3));
  }

  moves++;
  if(moves>10) return;
 }
}

// ---------- CHECK MELD ----------
function checkMeld(){

 if(selected.length!==3){
  log("Select 3 cards!");
  return;
 }

 let chosen=selected.map(i=>playerHand[i]);

 if(meldCheck(chosen)){
  log("Valid meld!");
  playerMelds.push(chosen);

  selected.sort((a,b)=>b-a).forEach(i=>{
   playerHand.splice(i,1);
  });

 } else {
  log("Invalid meld → WAR!");
  runWar();
 }

 selected=[];
 render();
}

// ---------- DRAW ----------
function drawDeck(){
 if(phase!=="draw") return;

 playerHand.push(deck.pop());
 phase="action";
 log("Now discard");
 render();
}

function drawDiscard(){
 if(phase!=="draw") return;

 playerHand.push(discardPile.shift());
 phase="action";
 log("Now discard");
 render();
}

// ---------- DISCARD ----------
function discard(){
 let d=playerHand.pop();
 discardPile.unshift(d);
 phase="draw";

 setTimeout(computerTurn,800);
}

// ---------- COMPUTER ----------
function computerTurn(){

 let overlay=document.getElementById("compOverlay");
 let text=document.getElementById("compText");
 let cardEl=document.getElementById("compCard");

 overlay.style.display="flex";

 setTimeout(()=>{

  let draw=Math.random()<0.5;

  if(draw && discardPile.length){
   computerHand.push(discardPile.shift());
   text.innerText="Computer takes discard";
  } else {
   computerHand.push(deck.pop());
   text.innerText="Computer draws deck";
  }

  setTimeout(()=>{

   let d=choosediscard(computerHand);
   computerHand.splice(computerHand.indexOf(d),1);
   discardPile.unshift(d);

   text.innerText="Computer discards";
   cardEl.innerText=d;

   setTimeout(()=>{
    overlay.style.display="none";
    phase="draw";
    render();
   },1000);

  },1000);

 },1000);
}

// ---------- LOG ----------
function log(t){
 document.getElementById("log").innerText=t;
}

// ---------- START ----------
render();

</script>

</body>
</html>
