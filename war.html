<!DOCTYPE html>
<html>
<head>
  <title>War Card Game</title>
  <style>
    body {
      background: #020617;
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin: 40px;
    }

    .card {
      width: 100px;
      height: 140px;
      background: white;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
    }

    #score {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🎮 War Card Game</h1>

<div class="cards">
  <div class="card" id="player">?</div>
  <div class="card" id="ai">?</div>
</div>

<button onclick="play()">Play Round</button>

<div id="result"></div>
<div id="score">Player: 0 | AI: 0</div>

<script>
let playerScore = 0;
let aiScore = 0;

function drawCard() {
  return Math.floor(Math.random() * 13) + 1;
}

function play() {
  let p = drawCard();
  let a = drawCard();

  document.getElementById("player").innerText = p;
  document.getElementById("ai").innerText = a;

  if (p > a) {
    playerScore++;
    document.getElementById("result").innerText = "You Win!";
  } else if (p < a) {
    aiScore++;
    document.getElementById("result").innerText = "AI Wins!";
  } else {
    document.getElementById("result").innerText = "WAR!";
  }

  document.getElementById("score").innerText =
    "Player: " + playerScore + " | AI: " + aiScore;
}
</script>

</body>
</html>
