<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rummy + War GOD MODE</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #111 0%, #222 100%);
        color: #fff;
        text-align: center;
        overflow-x: hidden;
    }

    h1 {
        font-size: 2.5em;
        text-shadow: 0 0 10px #ff0, 0 0 20px #f0f, 0 0 30px #0ff;
    }

    #player-hand, #table-melds, #discard-pile, #ai-area {
        margin: 20px auto;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .card {
        width: 60px;
        height: 90px;
        background: #222;
        border: 2px solid #fff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
        transform: scale(1.2);
        box-shadow: 0 0 15px #ff0, 0 0 25px #f0f;
    }

    .meld-card {
        border: 2px solid #0ff;
        box-shadow: 0 0 10px #0ff;
    }

    .discarded {
        border: 2px solid #f00;
        box-shadow: 0 0 10px #f00;
    }

    button {
        margin: 10px;
        padding: 10px 20px;
        font-size: 1em;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        background: linear-gradient(45deg,#ff0,#f0f);
        color: #111;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px #ff0, 0 0 25px #f0f;
    }

    #messages {
        margin-top: 20px;
        min-height: 50px;
        font-size: 1.1em;
        text-shadow: 0 0 5px #ff0;
    }

</style>
</head>
<body>

<h1>Rummy + War GOD MODE</h1>

<div id="messages"></div>

<div id="table-melds">
    <h3>Table Melds:</h3>
</div>

<div id="discard-pile">
    <h3>Discard Pile:</h3>
</div>

<div id="player-hand">
    <h3>Your Hand:</h3>
</div>

<div id="ai-area">
    <h3>Computer Area:</h3>
</div>

<div id="controls">
    <button onclick="drawDeck()">Draw from Deck</button>
    <button onclick="drawDiscard()">Draw from Discard</button>
    <button onclick="layMeld()">Lay Meld</button>
    <button onclick="declareRummy()">Declare Rummy</button>
</div>

<script>
/* ------------------- GOD MODE LOGIC ------------------- */
const cardsOrder = ["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits = ["♣","♦","♥","♠"];
let deck = [];
for(const s of suits){
    for(const c of cardsOrder){
        deck.push(s+c);
    }
}
deck = deck.sort(()=>Math.random()-0.5);

let playerHand = deck.splice(0,7);
let computerHand = deck.splice(0,7);
let discardPile = [deck.shift()];
let tableMelds = [];
let playerMelds = [];
let computerMelds = [];
let playerTurn = true;
let messagesDiv = document.getElementById("messages");

function logMessage(msg){
    messagesDiv.innerHTML = `<span>${msg}</span>` + messagesDiv.innerHTML;
}

/* ------------- RENDER FUNCTIONS ------------- */
function renderHands(){
    const playerDiv = document.getElementById("player-hand");
    playerDiv.innerHTML = "<h3>Your Hand:</h3>";
    playerHand.forEach((card,index)=>{
        const cardDiv = document.createElement("div");
        cardDiv.className="card";
        cardDiv.textContent = card;
        cardDiv.onclick = ()=>confirmDiscard(index);
        playerDiv.appendChild(cardDiv);
    });

    const tableDiv = document.getElementById("table-melds");
    tableDiv.innerHTML="<h3>Table Melds:</h3>";
    tableMelds.forEach(c=>{
        const d = document.createElement("div");
        d.className="card meld-card";
        d.textContent = c;
        tableDiv.appendChild(d);
    });

    const discardDiv = document.getElementById("discard-pile");
    discardDiv.innerHTML="<h3>Discard Pile:</h3>";
    if(discardPile[0]){
        const d = document.createElement("div");
        d.className="card discarded";
        d.textContent = discardPile[0];
        discardDiv.appendChild(d);
    }

    const aiDiv = document.getElementById("ai-area");
    aiDiv.innerHTML="<h3>Computer Area:</h3>";
    aiDiv.textContent = `Cards: ${computerHand.length}`;
}

/* ------------- HELPER FUNCTIONS ------------- */
function meldCheck(cards){
    if(cards.length!==3) return false;
    let ranks = cards.map(c=>c.slice(1));
    if(ranks[0]===ranks[1] && ranks[1]===ranks[2]) return true;
    let suitsArr = cards.map(c=>c[0]);
    if(suitsArr[0]===suitsArr[1] && suitsArr[1]===suitsArr[2]){
        let idxs = cards.map(c=>cardsOrder.indexOf(c.slice(1))).sort((a,b)=>a-b);
        if(idxs[0]+1===idxs[1] && idxs[1]+1===idxs[2]) return true;
    }
    return false;
}

function chooseDiscard(hand){
    let minScore = Infinity;
    let discard=null;
    hand.forEach(c=>{
        let score = hand.filter(x=>x.slice(1)===c.slice(1)).length;
        let rankIdx = cardsOrder.indexOf(c.slice(1));
        for(let k=-2;k<=2;k++){
            hand.forEach(h=>{
                if(h[0]===c[0] && cardsOrder.indexOf(h.slice(1))===rankIdx+k) score++;
            });
        }
        if(score<minScore){minScore=score;discard=c;}
    });
    return discard;
}

/* ------------- PLAYER ACTIONS ------------- */
function confirmDiscard(index){
    if(!playerTurn) return;
    if(confirm(`Are you sure you want to discard ${playerHand[index]}?`)){
        let card = playerHand.splice(index,1)[0];
        discardPile.unshift(card);
        logMessage(`Player discarded: ${card}`);
        playerTurn=false;
        renderHands();
        setTimeout(aiTurn,800);
    }
}

function drawDeck(){
    if(!playerTurn) return;
    if(deck.length===0){logMessage("Deck is empty!");return;}
    let card = deck.shift();
    playerHand.push(card);
    logMessage(`Player drew a card from deck.`);
    renderHands();
}

function drawDiscard(){
    if(!playerTurn) return;
    if(discardPile.length===0){logMessage("Discard pile empty!");return;}
    let card = discardPile.shift();
    playerHand.push(card);
    logMessage(`Player drew ${card} from discard pile.`);
    renderHands();
}

function layMeld(){
    if(!playerTurn) return;
    let idxs = prompt("Enter 3 card indexes separated by space (0-based)").split(" ").map(Number);
    if(idxs.length!==3){logMessage("Invalid input!");return;}
    let meld = idxs.map(i=>playerHand[i]);
    if(meldCheck(meld)){
        meld.forEach(c=>{tableMelds.push(c); playerHand.splice(playerHand.indexOf(c),1)});
        playerMelds.push(meld);
        logMessage(`Player laid meld: ${meld}`);
        playerTurn=false;
        renderHands();
        setTimeout(aiTurn,800);
    }else{
        logMessage("Invalid meld! WAR triggered!");
        runWarGame(playerHand,computerHand);
        playerTurn=false;
        renderHands();
        setTimeout(aiTurn,800);
    }
}

function declareRummy(){
    if(playerMelds.length>=2 && playerMelds.some(m=>meldCheck(m))){
        logMessage("PLAYER DECLARES RUMMY! YOU WIN! 🏆");
        playerTurn=false;
    }else{
        logMessage("Cannot declare Rummy yet! WAR triggered.");
        runWarGame(playerHand,computerHand);
        renderHands();
        playerTurn=false;
        setTimeout(aiTurn,800);
    }
}

/* ------------- AI TURN ------------- */
function aiTurn(){
    if(playerTurn) return;
    // Draw card animation (hidden)
    let drawn=null;
    if(Math.random()<0.5 && discardPile.length>0 && isUseful(discardPile[0],computerHand)){
        drawn = discardPile.shift();
    }else if(deck.length>0){
        drawn = deck.shift();
    }else{
        drawn = discardPile.shift();
    }
    computerHand.push(drawn);

    // Choose discard
    let discard = chooseDiscard(computerHand);
    computerHand.splice(computerHand.indexOf(discard),1);
    discardPile.unshift(discard);
    logMessage(`Computer discarded a card.`);
    renderHands();
    playerTurn=true;
}

function isUseful(card,hand){
    for(let i=0;i<hand.length;i++){
        for(let j=i+1;j<hand.length;j++){
            let comb = [card,hand[i],hand[j]];
            if(meldCheck(comb)) return true;
        }
    }
    return false;
}

/* ------------- WAR LOGIC ------------- */
function runWarGame(pHand,cHand){
    let table = [];
    logMessage("⚔️ WAR INITIATED ⚔️");
    while(true){
        if(pHand.length<2 || cHand.length<2){
            refillTo(pHand,7);
            refillTo(cHand,7);
            return "tie";
        }
        let p = pHand.shift();
        let c = cHand.shift();
        table.push(p,c);
        if(cardsOrder.indexOf(p.slice(1))>cardsOrder.indexOf(c.slice(1))){
            pHand.push(...table);
            logMessage("Player wins War!");
            return "player";
        }else if(cardsOrder.indexOf(p.slice(1))<cardsOrder.indexOf(c.slice(1))){
            cHand.push(...table);
            logMessage("Computer wins War!");
            return "computer";
        }else{
            if(pHand.length<4 || cHand.length<4){
                let half = Math.floor(table.length/2);
                pHand.push(...table.slice(0,half));
                cHand.push(...table.slice(half));
                return "tie";
            }
            table.push(...pHand.splice(0,3), ...cHand.splice(0,3));
        }
    }
}

function refillTo(hand,amount){
    while(hand.length<amount && deck.length>0) hand.push(deck.shift());
}

/* ----------- INITIAL RENDER ----------- */
renderHands();
logMessage("Game started! Your turn. Click cards to discard, or use buttons to draw/lay meld/declare rummy.");

</script>
</body>
</html>
