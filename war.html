<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy + War GOD MODE FINAL</title>

<style>
body {
    margin:0;
    font-family: monospace;
    background: radial-gradient(circle, #000, #111);
    color:white;
    overflow:hidden;
}

/* MESSAGE BAR */
#msg {
    position:fixed;
    top:0;
    width:100%;
    text-align:center;
    padding:10px;
    background:#111;
    color:#0ff;
    font-size:18px;
    box-shadow:0 0 10px cyan;
}

/* GAME */
#game { text-align:center; padding-top:60px; }

/* CARDS */
.card {
    display:inline-block;
    padding:15px;
    margin:5px;
    border:2px solid white;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}
.card:hover { transform:scale(1.2); }
.selected { box-shadow:0 0 20px cyan; }

/* DISCARD */
#discard {
    margin-top:20px;
    height:140px;
    position:relative;
}

.discard-card {
    position:absolute;
    width:80px;
    height:110px;
    border:2px solid red;
    border-radius:10px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px red;
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { box-shadow:0 0 10px red; }
    to { box-shadow:0 0 30px red; }
}

/* FLY */
.fly {
    position:fixed;
    z-index:999;
    transition:all 0.6s ease;
}

/* WAR */
#warScreen {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

/* AI TURN */
#aiBanner {
    position:fixed;
    top:40px;
    width:100%;
    text-align:center;
    font-size:25px;
    color:yellow;
    display:none;
}
</style>
</head>

<body>

<div id="msg">Your Turn</div>
<div id="aiBanner">AI TURN</div>

<div id="game">
<h1>Rummy + War</h1>

<div id="player"></div>
<div id="discard"></div>

<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="layMeld()">Lay Meld</button>
</div>

<div id="warScreen"></div>

<script>
// ---------- GLOBAL ----------
const order=["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits=["♣","♦","♥","♠"];

let deck=[],player=[],ai=[],discard=[];
let selected=[],mustDiscard=false;

for(let s of suits)
for(let c of order) deck.push(s+c);

deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// ---------- MESSAGE ----------
function msg(t){ document.getElementById("msg").textContent=t; }

// ---------- RENDER ----------
function render(){
    let p=document.getElementById("player");
    p.innerHTML="";

    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card";
        d.textContent=c;

        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=(e)=>{
            if(mustDiscard){
                discardCard(i,e.target);
                return;
            }

            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);

            render();
        };

        p.appendChild(d);
    });

    let ddiv=document.getElementById("discard");
    ddiv.innerHTML="";
    if(discard.length){
        let d=document.createElement("div");
        d.className="discard-card";
        d.textContent=discard[0];
        ddiv.appendChild(d);
    }
}

// ---------- DRAW ----------
function drawDeck(){
    if(mustDiscard){ msg("You must discard first!"); return; }
    player.push(deck.shift());
    mustDiscard=true;
    msg("Pick a card to discard");
    render();
}

function drawDiscard(){
    if(mustDiscard){ msg("You must discard first!"); return; }
    player.push(discard.shift());
    mustDiscard=true;
    msg("Pick a card to discard");
    render();
}

// ---------- DISCARD ----------
function animateDiscard(card,el){
    let r=el.getBoundingClientRect();
    let f=document.createElement("div");
    f.className="card fly";
    f.textContent=card;
    f.style.left=r.left+"px";
    f.style.top=r.top+"px";
    document.body.appendChild(f);

    let target=document.getElementById("discard").getBoundingClientRect();
    setTimeout(()=>{
        f.style.left=target.left+"px";
        f.style.top=target.top+"px";
    },10);

    setTimeout(()=>f.remove(),600);
}

function discardCard(i,el){
    let c=player[i];
    animateDiscard(c,el);

    setTimeout(()=>{
        discard.unshift(player.splice(i,1)[0]);
        mustDiscard=false;
        msg("AI thinking...");
        render();
        aiTurn();
    },600);
}

// ---------- MELD ----------
function meldCheck(c){
    if(c.length!=3)return false;
    let r=c.map(x=>x.slice(1));
    if(r[0]==r[1]&&r[1]==r[2])return true;
    let s=c.map(x=>x[0]);
    if(s[0]==s[1]&&s[1]==s[2]){
        let i=c.map(x=>order.indexOf(x.slice(1))).sort((a,b)=>a-b);
        return i[0]+1==i[1]&&i[1]+1==i[2];
    }
    return false;
}

async function layMeld(){
    if(selected.length!=3){ msg("Select 3 cards"); return; }

    let m=selected.map(i=>player[i]);

    if(meldCheck(m)){
        selected.sort((a,b)=>b-a).forEach(i=>player.splice(i,1));
        msg("Meld placed!");
    } else {
        msg("Invalid meld → WAR");
        await warGame();
    }

    selected=[];
    mustDiscard=false;
    render();
    aiTurn();
}

// ---------- WAR ----------
async function warGame(){
    let w=document.getElementById("warScreen");
    w.style.display="flex";
    w.innerHTML="⚔️ WAR ⚔️";
    await delay(1000);
    w.style.display="none";
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

// ---------- AI ----------
function aiTurn(){
    document.getElementById("aiBanner").style.display="block";

    setTimeout(()=>{
        let worst=ai[0];
        ai.splice(ai.indexOf(worst),1);
        discard.unshift(worst);

        render();
        document.getElementById("aiBanner").style.display="none";
        msg("Your Turn");
    },1000);
}

// ---------- START ----------
render();
</script>

</body>
</html>
