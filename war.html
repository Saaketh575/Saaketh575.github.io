<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rummy War GOD MODE</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:black;
    color:white;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#introText{
    max-width:700px;
    text-align:center;
    line-height:1.6;
}

#start{
    margin-top:20px;
    opacity:0.6;
    animation:blink 1s infinite alternate;
}
@keyframes blink{
    from{opacity:0.3;}to{opacity:1;}
}

/* BUTTONS */
button{
    background:#111;
    color:#0ff;
    border:2px solid #0ff;
    padding:10px;
    margin:5px;
    border-radius:8px;
}

/* CARDS */
.card{
    display:inline-block;
    padding:12px;
    margin:5px;
    border:2px solid white;
    border-radius:8px;
    cursor:pointer;
}
.selected{ box-shadow:0 0 20px cyan; }

/* DISCARD CENTER */
#discardBox{
    text-align:center;
}
.discard-card{
    width:90px;height:120px;
    border:2px solid red;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MELDS */
.meld{
    border:2px solid cyan;
    padding:8px;
    margin:5px;
    display:inline-block;
}

/* OVERLAYS */
#aiOverlay,#warOverlay{
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:45px;
    background:rgba(0,0,0,0.95);
    z-index:5000;
}

#continue{
    margin-top:20px;
    font-size:18px;
    opacity:0.7;
}

/* CONFIRM */
#confirm{
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div id="introText"></div>
<div id="start">Click to start</div>
</div>

<!-- GAME -->
<div id="game" style="display:none">

<div style="text-align:center">
<button onclick="drawDeck()">Draw Deck</button>
<button onclick="drawDiscard()">Draw Discard</button>
<button onclick="layMeld()">Lay Meld</button>
<button onclick="declareRummy()">Declare Rummy</button>
</div>

<div id="player" style="text-align:center"></div>

<div id="discardBox">
<div>DISCARD PILE</div>
<div id="discard"></div>
</div>

<div style="text-align:center">TABLE MELDS</div>
<div id="melds"></div>

</div>

<!-- CONFIRM -->
<div id="confirm">
<div style="background:#111;padding:20px">
<div id="confirmText"></div>
<button onclick="yesDiscard()">YES</button>
<button onclick="noDiscard()">NO</button>
</div>
</div>

<!-- AI -->
<div id="aiOverlay"></div>

<!-- WAR -->
<div id="warOverlay">
<div id="warText"></div>
<div id="continue">Click to continue</div>
</div>

<script>
// ================= INTRO =================
const introLines=[
"Welcome to Rummy War.",
"Build melds. Trigger wars.",
"Think carefully.",
"Or lose everything."
];

async function introType(){
    let box=document.getElementById("introText");
    for(let line of introLines){
        for(let c of line){
            box.innerHTML+=c;
            await new Promise(r=>setTimeout(r,20));
        }
        box.innerHTML+="<br><br>";
    }
}
introType();

document.onclick=()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("game").style.display="block";
};

// ================= DATA =================
const order=["2","3","4","5","6","7","8","9","X","J","Q","K","A","🤡"];
const suits=["♣","♦","♥","♠"];

let deck=[],player=[],ai=[],discard=[];
let selected=[],mustDiscard=false;
let tableMelds=[];
let pending=null;

// BUILD DECK
for(let s of suits) for(let c of order) deck.push(s+c);
deck.sort(()=>Math.random()-0.5);

player=deck.splice(0,7);
ai=deck.splice(0,7);
discard=[deck.shift()];

// ================= LOGIC =================
function meldCheck(c){
    let r=c.map(x=>x.slice(1));
    if(r[0]==r[1]&&r[1]==r[2]) return true;

    let s=c.map(x=>x[0]);
    let i=c.map(x=>order.indexOf(x.slice(1))).sort((a,b)=>a-b);

    return s[0]==s[1]&&i[0]+1==i[1]&&i[1]+1==i[2];
}

function cardscore(card,hand){
    let r=card.slice(1),s=card[0];
    let score=hand.filter(c=>c.slice(1)==r).length;

    let idx=order.indexOf(r);
    hand.forEach(c=>{
        if(c[0]==s && Math.abs(order.indexOf(c.slice(1))-idx)<=2){
            score++;
        }
    });
    return score;
}

function chooseDiscard(hand){
    return hand.reduce((a,b)=>cardscore(a,hand)<cardscore(b,hand)?a:b);
}

function isUseful(card,hand){
    for(let i=0;i<hand.length;i++)
    for(let j=i+1;j<hand.length;j++){
        if(meldCheck([card,hand[i],hand[j]])) return true;
    }
    return false;
}

// ================= RENDER =================
function render(){
    let p=document.getElementById("player");
    p.innerHTML="";
    player.forEach((c,i)=>{
        let d=document.createElement("div");
        d.className="card";
        d.textContent=c;

        if(selected.includes(i)) d.classList.add("selected");

        d.onclick=()=>{
            if(mustDiscard){askDiscard(i);return;}
            if(selected.includes(i)) selected=selected.filter(x=>x!=i);
            else if(selected.length<3) selected.push(i);
            render();
        };
        p.appendChild(d);
    });

    let ddiv=document.getElementById("discard");
    ddiv.innerHTML="";
    let d=document.createElement("div");
    d.className="discard-card";
    d.textContent=discard[0];
    ddiv.appendChild(d);

    let mdiv=document.getElementById("melds");
    mdiv.innerHTML="";
    tableMelds.forEach(m=>{
        let x=document.createElement("div");
        x.className="meld";
        x.textContent=m.join(" ");
        mdiv.appendChild(x);
    });
}

// ================= DRAW =================
function drawDeck(){
    if(mustDiscard)return;
    player.push(deck.shift());
    mustDiscard=true;
    render();
}
function drawDiscard(){
    if(mustDiscard)return;
    player.push(discard.shift());
    mustDiscard=true;
    render();
}

// ================= DISCARD =================
function askDiscard(i){
    pending=i;
    document.getElementById("confirm").style.display="flex";
    document.getElementById("confirmText").textContent="Discard "+player[i]+"?";
}
function yesDiscard(){
    discard.unshift(player.splice(pending,1)[0]);
    mustDiscard=false;
    document.getElementById("confirm").style.display="none";
    render();
    aiTurn();
}
function noDiscard(){
    document.getElementById("confirm").style.display="none";
}

// ================= OVERLAY =================
async function invade(text){
    let o=document.getElementById("aiOverlay");
    o.innerHTML=text;
    o.style.display="flex";
    await new Promise(r=>setTimeout(r,1200));
    o.style.display="none";
}

// ================= WAR =================
async function war(){
    let w=document.getElementById("warOverlay");
    let t=document.getElementById("warText");
    w.style.display="flex";

    while(true){
        let p=player.shift();
        let c=ai.shift();

        t.textContent=p+" vs "+c;
        await new Promise(r=>setTimeout(r,800));

        if(order.indexOf(p.slice(1))>order.indexOf(c.slice(1))){
            player.push(p,c);
            break;
        }
        if(order.indexOf(p.slice(1))<order.indexOf(c.slice(1))){
            ai.push(p,c);
            break;
        }

        t.textContent="WAR!";
        await new Promise(r=>setTimeout(r,800));
    }

    await new Promise(res=>{
        document.onclick=res;
    });

    w.style.display="none";
}

// ================= MELD =================
async function layMeld(){
    if(selected.length!=3) return;

    let m=selected.map(i=>player[i]);

    if(meldCheck(m)){
        selected.sort((a,b)=>b-a).forEach(i=>player.splice(i,1));
        tableMelds.push(m);
    } else {
        await invade("⚔️ WAR DECLARED ⚔️");
        await war();
    }

    selected=[];
    mustDiscard=false;
    render();
    aiTurn();
}

// ================= AI =================
async function aiTurn(){
    await invade("AI TURN");

    let top=discard[0];
    if(isUseful(top,ai)){
        await invade("AI TOOK DISCARD");
        ai.push(discard.shift());
    } else {
        await invade("AI DREW DECK");
        ai.push(deck.shift());
    }

    // meld attempt
    for(let i=0;i<ai.length;i++)
    for(let j=i+1;j<ai.length;j++)
    for(let k=j+1;k<ai.length;k++){
        let m=[ai[i],ai[j],ai[k]];
        if(meldCheck(m)){
            await invade("AI MELDED "+m.join(", "));
            m.forEach(c=>ai.splice(ai.indexOf(c),1));
            tableMelds.push(m);
            break;
        }
    }

    let d=chooseDiscard(ai);
    ai.splice(ai.indexOf(d),1);
    discard.unshift(d);

    await invade("AI DISCARDED "+d);

    render();
}

// ================= RUMMY =================
async function declareRummy(){
    if(tableMelds.length<2){
        await invade("NOT ENOUGH MELDS");
        return;
    }

    let run=tableMelds.some(m=>{
        let s=m.map(c=>c[0]);
        let i=m.map(c=>order.indexOf(c.slice(1))).sort((a,b)=>a-b);
        return s[0]==s[1]&&i[0]+1==i[1]&&i[1]+1==i[2];
    });

    if(!run){
        await invade("NO RUN → WAR");
        await war();
        return;
    }

    await invade("YOU WIN RUMMY");
}

// START
render();
</script>

</body>
</html>
